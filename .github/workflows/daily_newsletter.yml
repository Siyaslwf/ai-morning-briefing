name: Daily AI Newsletter

on:
  schedule:
    # Runs every day at 08:00 UTC (adjust to your timezone)
    # 08:00 UTC = 11:00 Riga time (EET/EEST)
    - cron: '0 8 * * *'
  workflow_dispatch:   # Also lets you trigger manually from GitHub UI

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
          echo "NEWSLETTER_RECIPIENTS=${{ secrets.NEWSLETTER_RECIPIENTS }}" >> .env
          echo "NEWSLETTER_ISSUE_NUMBER=${{ secrets.NEWSLETTER_ISSUE_NUMBER || '1' }}" >> .env
          echo "BEEHIIV_API_KEY=${{ secrets.BEEHIIV_API_KEY }}" >> .env
          echo "BEEHIIV_PUBLICATION_ID=${{ secrets.BEEHIIV_PUBLICATION_ID }}" >> .env
          echo "BEEHIIV_SEND_LIVE=${{ secrets.BEEHIIV_SEND_LIVE || 'false' }}" >> .env

      - name: Run newsletter
        # Change --topic to whatever you want, or pass a dynamic topic
        env:
          # Stream stdout/stderr live to the Actions log instead of buffering
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        run: python run_newsletter.py --topic "Latest AI developments and tools this week"

      - name: Upload HTML preview as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-preview
          path: .tmp/newsletter_*.html
          retention-days: 7
